{% extends "base.html" %}
{% block title %}Page Not Found — ROADSoS AI{% endblock %}

{% block content %}
<div class="min-h-screen bg-gray-50 dark:bg-slate-900 flex items-center justify-center px-4">
    <div class="text-center max-w-md">
        <div class="w-24 h-24 mx-auto bg-red-100 dark:bg-red-900/30 rounded-full flex items-center justify-center mb-6">
            <i class="fa-solid fa-triangle-exclamation text-primary text-4xl"></i>
        </div>
        <h1 class="text-6xl font-extrabold text-gray-900 dark:text-white mb-2">404</h1>
        <h2 class="text-xl font-bold text-gray-700 dark:text-gray-300 mb-4">Page Not Found</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-8">This page doesn't exist or has been moved. Don't worry — your emergency features are still fully operational.</p>
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="/" class="px-6 py-3 bg-primary text-white font-bold rounded-full hover:bg-primary-hover transition shadow-lg shadow-red-500/30">
                <i class="fa-solid fa-house mr-2"></i>Go Home
            </a>
            <a href="/sos" class="px-6 py-3 bg-secondary dark:bg-slate-700 text-white font-bold rounded-full hover:bg-slate-700 transition">
                <i class="fa-solid fa-bell mr-2"></i>Trigger SOS
            </a>
        </div>
        <div class="mt-8 pt-8 border-t border-gray-200 dark:border-slate-700">
            <p class="text-sm text-gray-400">Need immediate help?</p>
            <a href="tel:112" class="text-2xl font-extrabold text-primary hover:underline tracking-widest">112</a>
        </div>
    </div>
</div>
{% endblock %}
