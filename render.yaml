services:
  - type: web
    name: roadsos-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./roadsos.db
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.11.9"
